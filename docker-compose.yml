services:
  db:
    image: postgres:16-alpine
    container_name: presentiq-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: presentiq
      POSTGRES_PASSWORD: presentiq
      POSTGRES_DB: presentiq
    ports:
      - "5432:5432"
    volumes:
      - presentiq_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U presentiq -d presentiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: presentiq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: presentiq-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"

volumes:
  presentiq_pgdata: